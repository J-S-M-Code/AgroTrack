<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AgroTrack - Mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
  />
  <style>
    #map {
      height: 90vh;
      width: 100%;
    }
    #notificaciones {
      height: 10vh;
      overflow-y: auto;
      background: #f9f9f9;
      border-top: 1px solid #ccc;
      padding: 10px;
      font-family: sans-serif;
    }
    .notificacion {
      margin-bottom: 5px;
      padding: 5px;
      border-left: 5px solid #e74c3c;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="notificaciones"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script>
    const map = L.map("map").setView([-30.0, -66.0], 13); // Vista inicial
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
    }).addTo(map);

    let animalMarker = null;
    let userMarker = null;
    let campoPolygon = null;

    async function cargarDatos() {
      const [animalesRes, usuariosRes, camposRes] = await Promise.all([
        fetch("http://localhost:5000/api/animales"),
        fetch("http://localhost:5000/api/usuarios"),
        fetch("http://localhost:5000/api/campos"),
      ]);

      const animales = await animalesRes.json();
      const usuarios = await usuariosRes.json();
      const campos = await camposRes.json();

      const animal = animales[0];
      const usuario = usuarios[0];
      const campo = campos[0];

      const animalCoord = [animal.coordenadas.lat, animal.coordenadas.lon];
      const userCoord = [usuario.coordenadas.lat, usuario.coordenadas.lon];
      const campoCoords = campo.poligono.map(p => [p.lat, p.lon]);

      if (animalMarker) map.removeLayer(animalMarker);
      animalMarker = L.marker(animalCoord, { title: "Animal" })
        .addTo(map)
        .bindPopup("🐄 Animal");

      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker(userCoord, { title: "Usuario", icon: L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/1946/1946429.png',
        iconSize: [30, 30],
        iconAnchor: [15, 30],
      })})
        .addTo(map)
        .bindPopup("🧑 Usuario");

      if (campoPolygon) map.removeLayer(campoPolygon);
      campoPolygon = L.polygon(campoCoords, {
        color: "green",
        fillColor: "#2ecc71",
        fillOpacity: 0.3,
      }).addTo(map).bindPopup("🌾 Campo");
    }

    async function cargarNotificaciones() {
      const res = await fetch("http://localhost:5000/api/notificaciones");
      const notificaciones = await res.json();
      const contenedor = document.getElementById("notificaciones");
      contenedor.innerHTML = "";

      notificaciones.forEach(n => {
        const div = document.createElement("div");
        div.className = "notificacion";
        div.textContent = `🚨 ${n.mensaje} (${new Date(n.timestamp).toLocaleTimeString()})`;
        contenedor.appendChild(div);
      });
    }

    // Cargar al inicio
    cargarDatos();
    cargarNotificaciones();

    // Actualizar cada 5 segundos
    setInterval(cargarDatos, 5000);
    setInterval(cargarNotificaciones, 5000);
  </script>
</body>
</html>
